backend:
  name: github
  repo: munizcesar/InSpotGO-US
  branch: main
  base_url: https://inspotgo.com
  auth_endpoint: api/auth
  app_id: Ov23liut527fMI71NRQR

media_library:
  name: cloudinary
  config:
    cloud_name: drw9gzlgd
    api_key: '946123924823294'

media_folder: "public/images"
public_folder: "/images"

locale: en

collections:
  - name: posts
    label: Posts
    folder: src/content/posts
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - {label: Title, name: title, widget: string}
      - {label: Date, name: date, widget: datetime}
      - {label: Category, name: category, widget: select, options: ["Tech", "SaaS", "Software", "Guides"]}
      - {label: Tags, name: tags, widget: list, required: false}
      - {label: Description, name: description, widget: text}
      - {label: Cover Image, name: cover, widget: image, required: false}
      - {label: Read Time, name: readTime, widget: string, required: false, hint: "Ex: 5 min"}
      - {label: Featured, name: featured, widget: boolean, required: false, default: false}
      - {label: Draft, name: draft, widget: boolean, required: false, default: false}
      - label: Body
        name: body
        widget: markdown
        buttons:
          - bold
          - italic
          - code
          - link
          - heading-one
          - heading-two
          - heading-three
          - bulleted-list
          - numbered-list
          - quote
          - image
        editor_components:
          - image
          - code-block
          - callout
          - cta-button
          - pros-cons
          - youtube
        modes:
          - rich_text
          - raw
